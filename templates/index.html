<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Excel单据生成系统</title>

<style>

body{
font-family:Arial;
max-width:500px;
margin:auto;
padding:20px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:15px;
}

button{
padding:12px;
width:100%;
background:#2c7be5;
color:white;
border:none;
font-size:16px;
}

</style>

</head>

<body>

<h2>填写信息生成单据</h2>

<form action="/generate" method="post">

{% set labels = {
"title":"抬头",
"Contract No.":"代理合同号",
"importing country":"进口国",
"port of destination":"目的港",
"terms":"条款",
"commodity":"品名"
} %}

{% for v in variables %}

{% if v not in ["tax","address","bank"] %}

<label>

{{ labels.get(v,v) }}

</label>

{% if v == "title" %}

<select name="title" required>

<option value="">请选择抬头</option>
<option value="控股">控股</option>
<option value="进出口">进出口</option>

</select>

{% else %}

<input name="{{v}}" placeholder="请输入{{ labels.get(v,v) }}" required>

{% endif %}

{% endif %}

{% endfor %}

<button type="submit">生成全部Excel</button>

</form>

</body>

</html>
