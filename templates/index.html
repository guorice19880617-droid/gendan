<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Excel单据生成系统</title>

<style>

body{
font-family:Arial;
max-width:500px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
}

button{
padding:12px;
width:100%;
background:#2c7be5;
color:white;
border:none;
font-size:16px;
}

</style>

</head>

<body>

<h2>填写信息生成单据</h2>

<form action="/generate" method="post">

{% for v in variables %}

{% if v not in ["tax","address","bank"] %}

<label>{{v}}</label>

{% if v == "title" %}

<select name="title" required>
<option value="">请选择抬头</option>
<option value="海田控股">海田控股</option>
<option value="大洲进出口">大洲进出口</option>
</select>

{% else %}

<input name="{{v}}" required>

{% endif %}
{% endif %}
{% endfor %}

<button type="submit">生成全部Excel</button>

</form>

</body>

</html>
